services:
  db:
    image: postgres:16
    container_name: job_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: job_tracker_api
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/job_tracker
      SECRET_KEY: your_super_secret_key
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: